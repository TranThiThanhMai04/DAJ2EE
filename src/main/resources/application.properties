spring.application.name=demo



spring.datasource.url=jdbc:mysql://localhost:3306/apartmentmanagement?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4
spring.sql.init.encoding=UTF-8
spring.datasource.username=root
spring.datasource.password=

# Cấu hình Hibernate (Tự động cập nhật bảng nếu cần)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always