spring.application.name=demo

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}



spring.datasource.url=jdbc:mysql://localhost:3306/ApartmentManagement?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Cấu hình Hibernate (Tự động cập nhật bảng nếu cần)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=

# Thông tin cấu hình Google OAuth2
spring.security.oauth2.client.registration.google.client-id=MÃ_CLIENT_ID_CỦA_BẠN
spring.security.oauth2.client.registration.google.client-secret=MÃ_SECRET_CỦA_BẠN
spring.security.oauth2.client.registration.google.scope=email,profile
