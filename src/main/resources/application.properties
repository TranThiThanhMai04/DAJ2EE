spring.application.name=demo

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}



spring.datasource.url=jdbc:mysql://localhost:3306/ApartmentManagement?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Cấu hình Hibernate (Tự động cập nhật bảng nếu cần)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Thông tin cấu hình Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# =========================
# Notification Service Config
# =========================
app.portal.base-url=${APP_PORTAL_BASE_URL:http://localhost:8080}

# Email notification (JavaMailSender)
app.notification.email.enabled=${APP_NOTIFICATION_EMAIL_ENABLED:true}
app.notification.email.from=${APP_NOTIFICATION_EMAIL_FROM:no-reply@example.com}
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
# Gmail SMTP bắt buộc dùng App Password 16 ký tự (không dùng mật khẩu đăng nhập thông thường)
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT:5000}

# Zalo notification (webhook trung gian)
app.notification.zalo.enabled=${APP_NOTIFICATION_ZALO_ENABLED:false}
app.notification.zalo.webhook-url=${APP_NOTIFICATION_ZALO_WEBHOOK_URL:}
