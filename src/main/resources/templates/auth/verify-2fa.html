<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác thực 2 lớp | Apartment Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: radial-gradient(1200px circle at 15% 10%, rgba(124, 58, 237, 0.35), transparent 55%),
                        radial-gradient(1000px circle at 85% 35%, rgba(168, 85, 247, 0.35), transparent 60%),
                        linear-gradient(135deg, #0b1020 0%, #111827 45%, #0b1020 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 20px;
            padding: 2rem;
            color: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .otp-box {
            width: 48px;
            height: 56px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: all .15s ease;
        }
        .otp-box:focus {
            border-color: rgba(168, 85, 247, 0.7);
            box-shadow: 0 0 0 .25rem rgba(168, 85, 247, 0.18);
            transform: translateY(-1px);
        }
        .btn-verify {
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            border: none;
            padding: 0.8rem;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.35);
        }
        .hint {
            color: rgba(255,255,255,0.65);
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="mb-4">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                 style="width:64px;height:64px;background:rgba(168,85,247,0.18);border:1px solid rgba(168,85,247,0.35);">
                <span style="font-size:28px;">🔐</span>
            </div>
            <h3 class="mb-1">Xác thực 2 lớp</h3>
            <p class="hint mb-0">Nhập mã 6 số từ Google Authenticator.</p>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger py-2 small" th:text="${errorMessage}">Lỗi</div>
        <div th:if="${successMessage}" class="alert alert-success py-2 small" th:text="${successMessage}">OK</div>

        <form th:action="@{/auth/verify-2fa}" method="POST" id="otpForm" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="otpCode" id="otpCode" value="">

            <div class="d-flex justify-content-center gap-2 my-4" aria-label="OTP inputs">
                <input class="otp-box" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code" autofocus>
                <input class="otp-box" inputmode="numeric" pattern="[0-9]*" maxlength="1">
                <input class="otp-box" inputmode="numeric" pattern="[0-9]*" maxlength="1">
                <input class="otp-box" inputmode="numeric" pattern="[0-9]*" maxlength="1">
                <input class="otp-box" inputmode="numeric" pattern="[0-9]*" maxlength="1">
                <input class="otp-box" inputmode="numeric" pattern="[0-9]*" maxlength="1">
            </div>

            <button type="submit" class="btn btn-verify w-100 text-white rounded-pill">XÁC NHẬN</button>

            <div class="mt-4 d-flex justify-content-between small">
                <a href="/2fa/setup" class="text-decoration-none" style="color: rgba(255,255,255,0.8);">Thiết lập 2FA</a>
                <a href="/logout" class="text-decoration-none" style="color: rgba(255,255,255,0.55);">Đăng xuất</a>
            </div>
        </form>
    </div>

    <script>
        (function () {
            const inputs = Array.from(document.querySelectorAll(".otp-box"));
            const hidden = document.getElementById("otpCode");
            const form = document.getElementById("otpForm");

            function syncHidden() {
                hidden.value = inputs.map(i => (i.value || "")).join("");
            }

            function focusIndex(idx) {
                if (idx >= 0 && idx < inputs.length) inputs[idx].focus();
            }

            inputs.forEach((input, idx) => {
                input.addEventListener("input", (e) => {
                    const v = (input.value || "").replace(/\D/g, "");
                    input.value = v.slice(-1);
                    syncHidden();
                    if (input.value && idx < inputs.length - 1) focusIndex(idx + 1);
                });

                input.addEventListener("keydown", (e) => {
                    if (e.key === "Backspace" && !input.value && idx > 0) {
                        inputs[idx - 1].value = "";
                        syncHidden();
                        focusIndex(idx - 1);
                        e.preventDefault();
                    }
                    if (e.key === "ArrowLeft") { focusIndex(idx - 1); e.preventDefault(); }
                    if (e.key === "ArrowRight") { focusIndex(idx + 1); e.preventDefault(); }
                });

                input.addEventListener("paste", (e) => {
                    const text = (e.clipboardData || window.clipboardData).getData("text");
                    const digits = (text || "").replace(/\D/g, "").slice(0, inputs.length);
                    if (!digits) return;
                    digits.split("").forEach((d, i) => { inputs[i].value = d; });
                    syncHidden();
                    focusIndex(Math.min(digits.length, inputs.length - 1));
                    e.preventDefault();
                });
            });

            form.addEventListener("submit", (e) => {
                syncHidden();
                if (!hidden.value || hidden.value.length !== 6) {
                    e.preventDefault();
                    focusIndex(0);
                }
            });
        })();
    </script>
</body>
</html>
