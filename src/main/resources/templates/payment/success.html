<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .success-card { border: none; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; padding: 40px; background: white; }
        .success-icon { font-size: 80px; color: #4BB543; margin-bottom: 20px; animation: bounce 1s; }
        @keyframes bounce { 0% { transform: scale(0.5); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon"><i class="fas fa-check-circle"></i></div>
        <h3 class="fw-bold mb-3">Thành công!</h3>
        <p class="text-muted mb-4">Hóa đơn #<span th:text="${invoiceId}">123</span> của bạn đã được thanh toán thành công. Hệ thống đã tự động xác nhận và gạch nợ.</p>
        <a th:href="@{/tenant/invoices}" class="btn btn-primary rounded-pill px-4">Quay về danh sách</a>
    </div>
</body>
</html>
