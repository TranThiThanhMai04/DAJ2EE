<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanh toán thành công</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      th:href="@{/css/style.css}"
      href="../../static/css/style.css"
    />
    <style>
      body.success-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg-page) !important;
      }

      .success-card {
        width: 100%;
        max-width: 440px;
        padding: 2.25rem;
        text-align: center;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--bg-surface);
      }

      .success-icon {
        margin-bottom: 1rem;
        font-size: 72px;
        color: #15803d;
      }
    </style>
  </head>
  <body class="success-page">
    <div class="success-card">
      <div class="success-icon"><i class="fas fa-check-circle"></i></div>
      <h3 class="fw-bold mb-3">Thành công!</h3>
      <p class="text-muted mb-4">
        Hóa đơn #<span th:text="${invoiceId}">123</span> của bạn đã được thanh
        toán thành công. Hệ thống đã tự động xác nhận và gạch nợ.
      </p>
      <a th:href="@{/tenant/invoices}" class="btn btn-primary rounded-pill px-4"
        >Quay về danh sách</a
      >
    </div>
  </body>
</html>
