<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: tenant_sidebar}"></div>

        <div id="content">
            <!-- Navbar top -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">Quản lý sửa chữa</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 text-muted">Chào, <strong th:text="${fullName}">A</strong></span>
                        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <!-- Thông báo -->
                <div th:if="${success}" class="alert alert-success mt-3" th:text="${success}"></div>
                <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4><i class="fas fa-tools text-primary me-2"></i>Danh sách sự cố / sửa chữa</h4>
                    <a href="/tenant/maintenance/create" class="btn btn-primary"><i class="fas fa-plus me-1"></i>Gửi yêu cầu mới</a>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="card shadow-sm border-0">
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead class="table-light">
                                            <tr>
                                                <th class="ps-3">Mã YC</th>
                                                <th>Phòng</th>
                                                <th>Tiêu đề</th>
                                                <th>Ưu tiên</th>
                                                <th>Trạng thái</th>
                                                <th>Ngày gửi</th>
                                                <th>Ảnh đính kèm</th>
                                                <th>Phản hồi</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:if="${requests == null or requests.isEmpty()}">
                                                <td colspan="8" class="text-center text-muted py-4">Chưa có yêu cầu nào.</td>
                                            </tr>
                                            <tr th:each="req : ${requests}">
                                                <td class="ps-3 fw-bold text-muted" th:text="'#' + ${req.id}"></td>
                                                <td th:text="${req.roomNumber}"></td>
                                                <td>
                                                    <div class="fw-bold" th:text="${req.title}"></div>
                                                </td>
                                                <td>
                                                    <span th:if="${req.priority == 'HIGH'}" class="badge bg-danger">Cao</span>
                                                    <span th:if="${req.priority == 'MEDIUM'}" class="badge bg-warning text-dark">Trung bình</span>
                                                    <span th:if="${req.priority == 'LOW'}" class="badge bg-secondary">Thấp</span>
                                                </td>
                                                <td>
                                                    <span th:if="${req.status == 'PENDING'}" class="badge bg-secondary">ĐANG CHỜ XÉT DUYỆT</span>
                                                    <span th:if="${req.status == 'IN_PROGRESS'}" class="badge bg-primary">ĐANG XỬ LÝ SỬA CHỮA</span>
                                                    <span th:if="${req.status == 'COMPLETED'}" class="badge bg-success">ĐÃ HOÀN THÀNH</span>
                                                    <span th:if="${req.status == 'REJECTED'}" class="badge bg-danger">TỪ CHỐI DO KHÔNG HỢP LỆ</span>
                                                </td>
                                                <td th:text="${#temporals.format(req.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                                <td>
                                                    <img th:if="${req.imageUrl != null}" th:src="${req.imageUrl}" width="60" class="rounded shadow-sm" style="object-fit:cover; max-height:60px; cursor:pointer;" onclick="window.open(this.src)"/>
                                                    <span th:unless="${req.imageUrl != null}" class="text-muted small">Không</span>
                                                </td>
                                                <td class="text-muted small" th:text="${req.adminReply}"></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
