<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}">
    <meta charset="UTF-8">
    <title>Hợp đồng của tôi</title>
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{layouts/fragments :: tenant_sidebar}"></div>

    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
            <div class="container-fluid">
                <span class="navbar-text fw-bold text-dark">Quản lý Hợp đồng của tôi</span>
            </div>
        </nav>

        <div class="card glass-card border-0 mb-4">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1 fw-bold">Danh sách Hợp đồng</h5>
                    <p class="text-muted mb-0">Theo dõi thông tin hợp đồng thuê phòng của bạn.</p>
                </div>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card glass-card border-0">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                        <tr>
                            <th>Mã phòng</th>
                            <th>Ngày bắt đầu</th>
                            <th>Ngày kết thúc</th>
                            <th>Tiền cọc</th>
                            <th>Giá thuê (tháng)</th>
                            <th>Trạng thái</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(contracts)}">
                            <td colspan="7" class="text-center text-muted py-4">Bạn chưa có lịch sử hợp đồng nào.</td>
                        </tr>
                        <tr th:each="c : ${contracts}">
                            <td class="fw-bold" th:text="${c.room.roomNumber}"></td>
                            <td th:text="${c.startDate}"></td>
                            <td th:text="${c.endDate}"></td>
                            <td th:text="${c.deposit != null ? #numbers.formatDecimal(c.deposit, 0, 'COMMA', 0, 'POINT') + ' đ' : '0 đ'}"></td>
                            <td th:text="${#numbers.formatDecimal(c.monthlyRent, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            <td>
                                <span class="badge" th:classappend="${c.status.name() == 'PENDING'} ? 'bg-soft-info text-info' : (${c.status.name() == 'ACTIVE'} ? 'bg-soft-success text-success' : (${c.status.name() == 'EXPIRED'} ? 'bg-soft-secondary text-secondary' : 'bg-soft-danger text-danger'))"
                                      th:text="${c.status.name() == 'PENDING'} ? 'Chờ xác nhận' : (${c.status.name() == 'ACTIVE'} ? 'Đang hiệu lực' : (${c.status.name() == 'EXPIRED'} ? 'Hết hạn' : 'Đã hủy'))"></span>
                                <span th:if="${c.status.name() == 'ACTIVE' and c.endDate.isBefore(T(java.time.LocalDate).now().plusDays(30))}" 
                                      class="badge bg-soft-warning text-warning ms-1" title="Sắp hết hạn">
                                    <i class="fas fa-exclamation-triangle"></i> Sắp hết hạn
                                </span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{'/tenant/contracts/' + ${c.id}}" class="btn btn-sm btn-outline-info me-1" title="Xem chi tiết">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <form th:if="${c.status.name() == 'PENDING'}" th:action="@{'/tenant/contracts/' + ${c.id} + '/confirm'}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-success">
                                        <i class="fas fa-check-circle me-1"></i>Xác nhận
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
