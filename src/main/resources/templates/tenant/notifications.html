<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: tenant_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">THÔNG BÁO CỦA TÔI</span>
                    <div class="ms-auto d-flex align-items-center">
                        <div class="position-relative me-3">
                            <i class="fas fa-bell fs-5 text-muted"></i>
                            <span th:if="${unreadCount > 0}" id="notif-badge"
                                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                                  th:text="${unreadCount}">1</span>
                        </div>
                        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold text-primary mb-0">Danh sách thông báo</h4>
                    <button th:if="${unreadCount > 0}" class="btn btn-outline-success btn-sm rounded-pill px-3" onclick="markAllAsRead()">
                        <i class="fas fa-check-double me-1"></i> Đánh dấu tất cả đã đọc
                    </button>
                </div>

                <div class="row" id="notif-container">
                    <div th:each="notif : ${notifications}" class="col-12 mb-3">
                        <div th:class="${notif.isRead} ? 'card glass-card border-0 shadow-sm opacity-75' : 'card glass-card border-0 shadow-sm border-start border-primary border-4'"
                             th:id="'notif-card-' + ${notif.id}">
                            <div class="card-body p-3">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div class="flex-grow-1">
                                        <div class="d-flex align-items-center mb-1">
                                            <h6 class="fw-bold mb-0" th:text="${notif.title}">Tiêu đề</h6>
                                            <span th:if="${!notif.isRead}" class="badge bg-primary ms-2 small">Mới</span>
                                        </div>
                                        <p class="text-muted mb-2" th:text="${notif.content}">Nội dung...</p>
                                        <small class="text-secondary"><i class="far fa-clock me-1"></i><span th:text="${#temporals.format(notif.createdAt, 'dd/MM/yyyy HH:mm')}">24/03/2026 13:48</span></small>
                                    </div>
                                    <button th:if="${!notif.isRead}" 
                                            class="btn btn-sm btn-light text-primary rounded-circle" 
                                            th:onclick="'markAsRead(' + ${notif.id} + ')'">
                                        <i class="fas fa-check"></i>
                                    </button>
                                    <span th:if="${notif.isRead}" class="text-success small fw-bold">
                                        <i class="fas fa-check-double"></i> Đã đọc
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(notifications)}" class="col-12 text-center py-5">
                        <img src="https://cdni.iconscout.com/illustration/premium/thumb/no-notification-9883163-8031548.png" style="width: 200px;" alt="">
                        <p class="text-muted mt-3">Bạn chưa có thông báo nào.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function markAsRead(id) {
            fetch(`/tenant/notifications/read/${id}`, { method: 'POST' })
                .then(res => {
                    if (res.ok) window.location.reload();
                });
        }
        function markAllAsRead() {
            fetch('/tenant/notifications/read-all', { method: 'POST' })
                .then(res => {
                    if (res.ok) window.location.reload();
                });
        }
    </script>
</body>
</html>
