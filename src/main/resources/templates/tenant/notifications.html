<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: tenant_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">Hệ thống Quản lý Chung cư</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 text-muted">Chào, <strong th:text="${fullName}">Khách</strong></span>
                        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                    </div>
                </div>
            </nav>

            <div class="card glass-card border-0 mt-4">
                <div class="card-header bg-transparent border-0 pt-4 px-4">
                    <h5 class="fw-bold mb-0">Thông Báo Từ Quản Lý</h5>
                </div>
                <div class="card-body px-4 pb-4">
                    <div class="list-group list-group-flush">
                        <th:block th:each="nt : ${notifications}">
                            <div class="list-group-item px-0 py-3 border-bottom d-flex align-items-center gap-3">
                                <span th:if="${nt.type == 'Bảo trì'}" class="badge bg-soft-warning text-warning p-2 rounded-circle fs-5"><i class="fas fa-tools"></i></span>
                                <span th:if="${nt.type == 'Nhắc đóng tiền'}" class="badge bg-soft-danger text-danger p-2 rounded-circle fs-5"><i class="fas fa-money-bill-wave"></i></span>
                                <span th:if="${nt.type != 'Bảo trì' && nt.type != 'Nhắc đóng tiền'}" class="badge bg-soft-primary text-primary p-2 rounded-circle fs-5"><i class="fas fa-info-circle"></i></span>
                                
                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-center mb-1">
                                        <h6 class="mb-0 fw-bold" th:text="${nt.title}">Tiêu đề</h6>
                                        <small class="text-muted" th:text="${#temporals.format(nt.createdAt, 'dd/MM/yyyy HH:mm')}">Thời điểm</small>
                                    </div>
                                    <p class="mb-0 text-muted small" th:text="${nt.message}">Nội dung...</p>
                                </div>
                            </div>
                        </th:block>
                        <div th:if="${#lists.isEmpty(notifications)}" class="text-center p-4 text-muted">
                            Bạn chưa có thông báo mới nào.
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
