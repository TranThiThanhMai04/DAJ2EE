<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body class="bg-light">
<div class="admin-wrapper">
    <div th:replace="~{layouts/fragments :: tenant_sidebar}"></div>

    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4 mx-3 mt-3">
            <div class="container-fluid">
                <span class="navbar-text fw-bold text-dark fs-5">
                    <i class="fas fa-file-invoice-dollar me-2 text-primary"></i>Hóa đơn của tôi
                </span>
                <div class="ms-auto text-end">
                    <small class="text-muted d-block">Xin chào,</small>
                    <span class="fw-bold text-dark" th:text="${fullName != null ? fullName : #authentication.name}">Tenant</span>
                </div>
            </div>
        </nav>

        <div class="container-fluid px-4" th:with="invoiceCount=${invoices != null ? invoices.size() : 0}">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
                    <h5 class="mb-0"><i class="fas fa-history me-2"></i>Danh sách hóa đơn</h5>
                    <span class="badge bg-white text-primary" th:text="|${invoiceCount} hóa đơn|">0 hóa đơn</span>
                </div>

                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-4">Mã</th>
                                <th>Phòng</th>
                                <th>Kỳ</th>
                                <th>Ngày phát hành</th>
                                <th>Hạn thanh toán</th>
                                <th>Tổng tiền</th>
                                <th>Trạng thái</th>
                                <th class="text-end pe-4">Hành động</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${invoices == null or #lists.isEmpty(invoices)}">
                                <td colspan="8" class="text-center py-5 text-muted">
                                    Hiện tại bạn chưa có hóa đơn.
                                </td>
                            </tr>

                            <tr th:each="invoice : ${invoices}">
                                <td class="ps-4 fw-semibold" th:text="${invoice.id}">1</td>
                                <td th:text="${invoice.contract != null and invoice.contract.room != null ? invoice.contract.room.roomNumber : (invoice.roomName != null ? invoice.roomName : 'N/A')}">A-101</td>
                                <td th:text="|${invoice.month}/${invoice.year}|">03/2026</td>
                                <td th:text="${invoice.issueDate != null ? #dates.format(invoice.issueDate, 'dd/MM/yyyy') : '--/--/----'}">01/03/2026</td>
                                <td th:text="${invoice.dueDate != null ? #dates.format(invoice.dueDate, 'dd/MM/yyyy') : '--/--/----'}">10/03/2026</td>
                                <td>
                                    <span th:text="${invoice.totalAmount != null ? #numbers.formatDecimal(invoice.totalAmount, 0, 'POINT', 0, 'COMMA') : '0'}">0</span>
                                    <span> đ</span>
                                </td>
                                <td>
                                    <span th:if="${invoice.paymentStatus != null and invoice.paymentStatus.name() == 'PAID'}" class="badge bg-success">Đã thanh toán</span>
                                    <span th:if="${invoice.paymentStatus != null and invoice.paymentStatus.name() == 'UNPAID'}" class="badge bg-warning text-dark">Chờ thanh toán</span>
                                    <span th:if="${invoice.paymentStatus != null and invoice.paymentStatus.name() == 'OVERDUE'}" class="badge bg-danger">Quá hạn</span>
                                    <span th:if="${invoice.paymentStatus == null}" class="badge bg-secondary">Không rõ</span>
                                </td>
                                <td class="text-end pe-4">
                                    <a th:href="@{/tenant/invoices/{id}(id=${invoice.id})}" class="btn btn-sm btn-outline-primary">
                                        Chi tiết
                                    </a>
                                    <a th:if="${invoice.paymentStatus != null and invoice.paymentStatus.name() != 'PAID'}"
                                       th:href="@{/payment/{id}(id=${invoice.id})}"
                                       class="btn btn-sm btn-success ms-1">
                                        Thanh toán
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
