<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: tenant_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">Hóa đơn của tôi</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 text-muted">Chào, <strong th:text="${#authentication.name}">Tenant</strong></span>
                        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="card glass-card border-0">
                    <div class="card-header bg-transparent border-0 pt-4 px-4">
                        <h5 class="fw-bold mb-0"><i class="fas fa-history me-2"></i>Lịch sử Hóa đơn</h5>
                    </div>
                    <div class="card-body px-4 pb-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Phòng</th>
                                        <th>Kỳ hạn</th>
                                        <th>Ngày phát hành</th>
                                        <th>Hạn chót</th>
                                        <th>Tổng tiền</th>
                                        <th>Trạng thái</th>
                                        <th>Hành động</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="invoice : ${invoices}">
                                        <td th:text="${invoice.id}">1</td>
                                        <td th:text="${invoice.contract.room.roomNumber}" class="fw-bold">A-101</td>
                                        <td th:text="${invoice.month + '/' + invoice.year}">03/2026</td>
                                        <td th:text="${#dates.format(invoice.issueDate, 'dd/MM/yyyy')}">23/03/2026</td>
                                        <td th:text="${#dates.format(invoice.dueDate, 'dd/MM/yyyy')}" class="text-danger fw-bold">30/03/2026</td>
                                        <td class="fw-bold text-primary" th:text="${#numbers.formatDecimal(invoice.totalAmount, 0, 'COMMA', 0, 'POINT') + ' đ'}">3,500,000 đ</td>
                                        <td>
                                            <span th:if="${invoice.paymentStatus.name() == 'PAID'}" class="badge bg-soft-success">Đã thanh toán</span>
                                            <span th:if="${invoice.paymentStatus.name() == 'UNPAID'}" class="badge bg-soft-warning text-warning">Chưa thanh toán</span>
                                            <span th:if="${invoice.paymentStatus.name() == 'OVERDUE'}" class="badge bg-soft-danger">Quá hạn</span>
                                        </td>
                                        <td>
                                            <a th:href="@{/tenant/invoices/{id}(id=${invoice.id})}" class="btn btn-sm btn-outline-primary rounded-pill px-2"><i class="fas fa-eye"></i></a>
                                            <a th:if="${invoice.paymentStatus.name() != 'PAID'}" th:href="@{/payment/{id}(id=${invoice.id})}" class="btn btn-sm btn-outline-success rounded-pill px-2"><i class="fas fa-wallet"></i> Thanh toán</a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(invoices)}">
                                        <td colspan="6" class="text-center py-4 text-muted italic">Bạn chưa có hóa đơn nào.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
