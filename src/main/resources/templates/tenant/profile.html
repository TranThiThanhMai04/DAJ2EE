<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head th:replace="~{layouts/fragments :: html_head}">
    <title>Hồ sơ cá nhân</title>
  </head>

  <body class="bg-light">
    <div class="admin-wrapper d-flex">
      <div th:replace="~{layouts/fragments :: tenant_sidebar}"></div>

      <div id="content" class="flex-grow-1 p-0 p-md-3">
        <nav
          class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4 p-3 d-none d-md-flex"
        >
          <div class="container-fluid">
            <span class="navbar-text fw-bold text-dark">
              <i class="fas fa-id-badge me-2 text-primary"></i> Quản lý Hồ sơ cá
              nhân
            </span>
            <div class="ms-auto d-flex align-items-center">
              <span class="me-3 text-muted"
                >Chào,
                <strong th:text="${user.fullName}">Nguyễn Văn A</strong></span
              >
              <a href="/logout" class="btn btn-outline-danger btn-sm"
                ><i class="fas fa-power-off"></i
              ></a>
            </div>
          </div>
        </nav>

        <div class="container-fluid py-4 py-md-0">
          <div
            class="card gradient-header shadow-sm mb-4 border-0"
            style="background: var(--primary-gradient); color: white"
          >
            <div class="card-body p-4 d-flex align-items-center">
              <div
                class="bg-white text-primary rounded-circle d-flex justify-content-center align-items-center me-4 shadow"
                style="
                  width: 80px;
                  height: 80px;
                  font-size: 2rem;
                  font-weight: bold;
                "
              >
                <span th:text="${#strings.substring(user.fullName,0,1)}"
                  >N</span
                >
              </div>
              <div>
                <h3 class="fw-bold mb-1" th:text="${user.fullName}">
                  Tên người dùng
                </h3>
                <p class="mb-0 opacity-75">
                  <i class="fas fa-user-circle me-1"></i> Quản lý thông tin và
                  bảo mật tài khoản của bạn
                </p>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-4">
              <div class="card glass-card shadow-sm h-100 border-0">
                <div
                  class="card-header bg-white fw-bold text-uppercase pt-3 pb-2 border-bottom"
                >
                  <i
                    class="fas fa-user-edit me-2"
                    style="color: var(--accent-strong)"
                  ></i
                  >Thông tin liên hệ
                </div>
                <div class="card-body p-4">
                  <form id="profileForm">
                    <div class="mb-3">
                      <label class="form-label text-muted small fw-bold"
                        >Trạng thái hệ thống</label
                      >
                      <div class="d-flex gap-2">
                        <span
                          class="badge bg-success bg-opacity-10 text-success border border-success p-2"
                        >
                          <i class="fas fa-check-circle me-1"></i> Đang hoạt
                          động
                        </span>
                        <span
                          class="badge bg-primary bg-opacity-10 text-primary border border-primary p-2"
                          th:text="${user.role.name == 'ROLE_ADMIN' ? 'Quản trị viên' : 'Cư dân'}"
                        >
                          Cư dân
                        </span>
                      </div>
                    </div>

                    <div class="mb-3">
                      <label class="form-label fw-bold"
                        >Địa chỉ Email
                        <i
                          class="fas fa-lock text-muted ms-1"
                          title="Không thể thay đổi"
                        ></i
                      ></label>
                      <input
                        type="email"
                        class="form-control bg-light text-muted"
                        th:value="${user.email}"
                        readonly
                      />
                      <div class="form-text">
                        Email dùng để nhận thông báo từ hệ thống.
                      </div>
                    </div>

                    <div class="mb-3">
                      <label for="fullName" class="form-label fw-bold"
                        >Họ và Tên <span class="text-danger">*</span></label
                      >
                      <input
                        type="text"
                        class="form-control border-primary"
                        id="fullName"
                        name="fullName"
                        th:value="${user.fullName}"
                        required
                      />
                    </div>

                    <div class="mb-3">
                      <label for="cccd" class="form-label fw-bold"
                        >Số CCCD
                        <i
                          class="fas fa-lock text-muted ms-1"
                          title="Không thể tự thay đổi"
                        ></i
                      ></label>
                      <input
                        type="text"
                        class="form-control bg-light text-muted"
                        id="cccd"
                        name="cccd"
                        th:value="${user.cccd}"
                        readonly
                      />
                      <div class="form-text text-danger small">
                        <i class="fas fa-info-circle me-1"></i> Thông tin định
                        danh không thể tự thay đổi
                      </div>
                    </div>

                    <div class="mb-4">
                      <label for="phone" class="form-label fw-bold"
                        >Số điện thoại
                        <i
                          class="fas fa-lock text-muted ms-1"
                          title="Không thể thay đổi"
                        ></i
                      ></label>
                      <input
                        type="tel"
                        class="form-control bg-light text-muted"
                        id="phone"
                        name="phone"
                        th:value="${user.username}"
                        readonly
                      />
                      <div class="form-text">
                        Số điện thoại dùng làm tên đăng nhập.
                      </div>
                    </div>

                    <button
                      type="button"
                      onclick="updateProfile()"
                      class="btn btn-primary w-100 fw-bold border-0"
                      style="background: var(--primary-gradient)"
                    >
                      <i class="fas fa-save me-2"></i> LƯU THAY ĐỔI
                    </button>
                  </form>
                </div>
              </div>
            </div>

            <div class="col-md-6 mb-4">
              <div class="card glass-card shadow-sm h-100 border-0">
                <div
                  class="card-header bg-white fw-bold text-uppercase pt-3 pb-2 border-bottom"
                >
                  <i class="fas fa-key me-2 text-danger"></i>Đổi mật khẩu
                </div>
                <div class="card-body p-4">
                  <form id="passwordForm">
                    <div class="mb-3">
                      <label for="currentPassword" class="form-label fw-bold"
                        >Mật khẩu hiện tại</label
                      >
                      <div class="input-group">
                        <span class="input-group-text bg-light"
                          ><i class="fas fa-unlock-alt text-muted"></i
                        ></span>
                        <input
                          type="password"
                          class="form-control"
                          id="currentPassword"
                          name="currentPassword"
                          required
                        />
                      </div>
                    </div>

                    <div class="mb-3">
                      <label for="newPassword" class="form-label fw-bold"
                        >Mật khẩu mới</label
                      >
                      <div class="input-group">
                        <span class="input-group-text bg-light"
                          ><i class="fas fa-lock text-primary"></i
                        ></span>
                        <input
                          type="password"
                          class="form-control border-primary"
                          id="newPassword"
                          name="newPassword"
                          required
                          minlength="8"
                        />
                      </div>
                    </div>

                    <div class="mb-4">
                      <label for="confirmPassword" class="form-label fw-bold"
                        >Xác nhận mật khẩu mới</label
                      >
                      <div class="input-group">
                        <span class="input-group-text bg-light"
                          ><i class="fas fa-check-double text-primary"></i
                        ></span>
                        <input
                          type="password"
                          class="form-control border-primary"
                          id="confirmPassword"
                          name="confirmPassword"
                          required
                          minlength="8"
                        />
                      </div>
                    </div>

                    <button
                      type="button"
                      onclick="changePassword()"
                      class="btn btn-danger w-100 fw-bold border-0"
                      style="
                        background: linear-gradient(90deg, #2f6cc5, #214f95);
                      "
                    >
                      <i class="fas fa-sync-alt me-2"></i> CẬP NHẬT MẬT KHẨU
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
    <script th:src="@{/js/profile.js}" src="/js/profile.js"></script>
  </body>
</html>
