<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}">
    <meta charset="UTF-8">
    <title>Thông tin cá nhân</title>
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{layouts/fragments :: tenant_sidebar}"></div>

    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
            <div class="container-fluid">
                <span class="navbar-text fw-bold text-dark">Hồ sơ Của Tôi</span>
            </div>
        </nav>

        <div class="card glass-card border-0 shadow-sm mx-auto" style="max-width: 800px;">
            <div class="card-header bg-white border-0 pt-4 pb-0">
                <h5 class="fw-bold mb-0">Thông tin cá nhân</h5>
            </div>
            <div class="card-body">
                
                <div th:if="${successMessage}" class="alert alert-success mt-2" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger mt-2" th:text="${errorMessage}"></div>

                <div class="alert alert-info mt-3">
                    <strong>Lưu ý:</strong> Bạn chỉ được phép đổi <b>Tên đăng nhập</b> và <b>Mật khẩu</b>. 
                    Các thông tin khác (SĐT, Email, CCCD, Họ tên) đã được số hóa theo hợp đồng. Nếu muốn thay đổi, vui lòng gửi yêu cầu đến Admin.
                </div>

                <form th:action="@{/tenant/profile/update}" th:object="${profileDto}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và tên</label>
                        <input type="text" class="form-control" th:field="*{fullName}" readonly />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Số CCCD</label>
                        <input type="text" class="form-control" th:field="*{cccd}" readonly />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" readonly />
                    </div>

                    <hr class="my-4">
                    <h5 class="mb-3">Thông tin có thể thay đổi</h5>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên đăng nhập (Username)</label>
                        <input type="text" class="form-control" th:field="*{phone}" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Mật khẩu mới</label>
                            <input type="password" class="form-control" th:field="*{password}" placeholder="Bỏ trống nếu không đổi" />
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Xác nhận Mật khẩu mới</label>
                            <input type="password" class="form-control" th:field="*{confirmPassword}" />
                        </div>
                    </div>

                    <div class="text-end">
                        <button type="submit" class="btn btn-gradient text-white">Cập nhật hồ sơ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
