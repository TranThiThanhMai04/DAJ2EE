<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: tenant_sidebar}"></div>

        <div id="content">
            <!-- Navbar top -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">Gắn yêu cầu sửa chữa</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 text-muted">Chào, <strong th:text="${fullName}">A</strong></span>
                        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white pt-3 pb-3">
                        <h5 class="mb-0"><i class="fas fa-hammer me-2"></i>Gửi báo cáo sự cố phần mềm / cơ sở vật chất</h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/tenant/maintenance/create}" method="post" enctype="multipart/form-data">
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="roomNumber" class="form-label fw-bold">Số phòng của bạn <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="roomNumber" name="roomNumber" required placeholder="VD: 102">
                                </div>
                                <div class="col-md-6">
                                    <label for="priority" class="form-label fw-bold">Mức độ cảnh báo (Ưu tiên) <span class="text-danger">*</span></label>
                                    <select class="form-select" id="priority" name="priority" required>
                                        <option value="LOW">Thấp (Khắc phục trong khung giờ bình thường)</option>
                                        <option value="MEDIUM" selected>Trung bình (Cần khắc phục sớm)</option>
                                        <option value="HIGH">Cao (Khẩn cấp, có thể gây mất an toàn)</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="title" class="form-label fw-bold">Tiêu đề (Vấn đề tóm tắt) <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="title" name="title" required placeholder="VD: Rò rỉ ống nước khu vực vệ sinh">
                            </div>
                            
                            <div class="mb-3">
                                <label for="description" class="form-label fw-bold">Mô tả chi tiết <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="description" name="description" rows="5" required placeholder="Vui lòng mô tả chi tiết vấn đề bạn đang gặp phải để ban quản lý có thể xem xét..."></textarea>
                            </div>

                            <div class="mb-4">
                                <label for="image" class="form-label fw-bold">Tải lên hình ảnh (Nếu có)</label>
                                <input class="form-control" type="file" id="image" name="image" accept="image/*">
                                <div class="form-text mt-2"><i class="fas fa-info-circle me-1"></i>Vui lòng chụp ảnh tình hình sự cố nếu có thể để hỗ trợ quá trình sửa chữa nhanh chóng.</div>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a href="/tenant/maintenance" class="btn btn-secondary">Quay lại</a>
                                <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane me-2"></i>Gửi yêu cầu</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
