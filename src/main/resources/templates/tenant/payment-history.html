<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="tenant-wrapper">
        <div th:replace="~{layouts/fragments :: tenant_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">Lịch sử thanh toán của tôi</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 text-muted">Chào, <strong th:text="${tenantName}">Tenant</strong></span>
                        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="card glass-card border-0">
                    <div class="card-header bg-transparent border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0"><i class="fas fa-file-invoice-dollar me-2 text-success"></i>Lịch sử các giao dịch đã thanh toán</h5>
                    </div>
                    <div class="card-body px-4 pb-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Mã GD</th>
                                        <th>Số tiền trả</th>
                                        <th>Hóa đơn (Kỳ)</th>
                                        <th>Ngày Thanh Toán</th>
                                        <th>Phương thức</th>
                                        <th>Trạng thái</th>
                                        <th>Ghi chú</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="hist : ${histories}">
                                        <td class="fw-bold text-muted" th:text="'#' + ${hist.id}">#1</td>
                                        <td class="fw-bold text-primary" th:text="${#numbers.formatDecimal(hist.amountPaid, 0, 'COMMA', 0, 'POINT')} + ' đ'">10,000,000 đ</td>
                                        <td>
                                            <a th:href="@{/tenant/invoices/{id}(id=${hist.invoice.id})}" title="Xem hóa đơn" class="text-decoration-none fw-bold" th:text="${hist.invoice.month + '/' + hist.invoice.year}">03/2026</a>
                                        </td>
                                        <td th:text="${#temporals.format(hist.paidAt, 'dd/MM/yyyy HH:mm')}">24/03/2026 10:00</td>
                                        <td>
                                            <span class="badge bg-soft-info text-info" th:text="${hist.paymentMethod}">Thẻ</span>
                                        </td>
                                        <td>
                                            <span class="badge bg-success" th:text="${hist.status.name()}">CONFIRMED</span>
                                        </td>
                                        <td th:text="${hist.transactionNote}">-</td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(histories)}">
                                        <td colspan="7" class="text-center py-4 text-muted italic">Bạn chưa có lịch sử thanh toán nào!</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script chung -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
