<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: tenant_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">Hệ thống Quản lý Chung cư</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 text-muted">Chào, <strong th:text="${fullName}">Khách</strong></span>
                        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                    </div>
                </div>
            </nav>

            <div class="card glass-card border-0 p-4 h-100 mt-2">
                <div class="card-header bg-transparent border-0 pt-0 px-0 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0">Báo Cáo Điện Nước & Dịch Vụ Hàng Tháng</h5>
                </div>
                <div class="card-body px-0 pb-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-bordered">
                            <thead class="table-light">
                                <tr class="text-center">
                                    <th>Kỳ thu</th>
                                    <th>Điện (KWh)</th>
                                    <th>Tiền Điện</th>
                                    <th>Nước (Khối)</th>
                                    <th>Tiền Nước</th>
                                    <th>Tiền Thuê Phòng</th>
                                    <th>Tổng Phải Đóng</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="inv : ${invoices}" class="text-center">
                                    <td class="fw-bold" th:text="|${inv.month}/${inv.year}|"></td>
                                    <td th:text="${inv.electricUsage}"></td>
                                    <td class="text-danger" th:text="${#numbers.formatDecimal(inv.electricCost, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                    <td th:text="${inv.waterUsage}"></td>
                                    <td class="text-danger" th:text="${#numbers.formatDecimal(inv.waterCost, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                    <td th:text="${#numbers.formatDecimal(inv.rentAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                    <td class="fw-bold text-success" th:text="${#numbers.formatDecimal(inv.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                    <td>
                                        <span th:if="${inv.status == 'PAID'}" class="badge bg-soft-success text-success">Đã đóng</span>
                                        <span th:if="${inv.status == 'UNPAID'}" class="badge bg-soft-danger text-danger">Chưa đóng</span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(invoices)}">
                                    <td colspan="8" class="text-center text-muted">Bạn chưa có báo cáo hoạt động dịch vụ nào.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
