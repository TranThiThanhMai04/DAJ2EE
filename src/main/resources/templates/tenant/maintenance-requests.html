<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}">
    <title>Yêu cầu Sửa chữa</title>
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{layouts/fragments :: tenant_sidebar}"></div>

    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
            <div class="container-fluid">
                <span class="navbar-text fw-bold text-dark">Gửi Yêu Cầu Sửa Chữa</span>
            </div>
        </nav>

        <div th:if="${successDetails}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successDetails}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorDetails}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorDetails}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="card glass-card border-0 shadow-sm h-100">
                    <div class="card-header bg-transparent border-0 pt-4 pb-0">
                        <h5 class="mb-0 fw-bold"><i class="fas fa-tools text-primary me-2"></i>Tạo Yêu Cầu Mới</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/tenant/maintenance/create}" method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="description" class="form-label fw-bold">Mô tả sự cố <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="description" name="description" rows="4" placeholder="Ví dụ: Đèn phòng tắm bị hỏng..." required></textarea>
                            </div>
                            <div class="mb-4">
                                <label for="image" class="form-label fw-bold">Hình ảnh đính kèm (không bắt buộc)</label>
                                <input class="form-control" type="file" id="image" name="image" accept="image/*">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold" style="background: var(--primary-gradient); border: none; padding: 12px;">
                                <i class="fas fa-paper-plane me-2"></i> Gửi Yêu Cầu
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7 mb-4">
                <div class="card glass-card border-0 shadow-sm h-100">
                    <div class="card-header bg-transparent border-0 pt-4 pb-0">
                        <h5 class="mb-0 fw-bold"><i class="fas fa-history text-secondary me-2"></i>Lịch sử Yêu Cầu</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                <tr>
                                    <th>#Mã</th>
                                    <th>Mô tả</th>
                                    <th>Ảnh minh chứng</th>
                                    <th>Trạng thái</th>
                                    <th>Ngày tạo</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:if="${#lists.isEmpty(requests)}">
                                    <td colspan="5" class="text-center text-muted py-4">Chưa có yêu cầu nào được gửi.</td>
                                </tr>
                                <tr th:each="r : ${requests}">
                                    <td class="fw-bold text-muted">#<span th:text="${r.id}"></span></td>
                                    <td>
                                        <div style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" 
                                             th:title="${r.description}" th:text="${r.description}"></div>
                                    </td>
                                    <td>
                                        <a href="#" th:if="${r.imageUrl != null}" data-bs-toggle="modal" th:data-bs-target="'#imgModal' + ${r.id}">
                                            <img th:src="@{${r.imageUrl}}" alt="thumb" class="rounded shadow-sm" style="width: 45px; height: 45px; object-fit: cover; border: 2px solid #fff;">
                                        </a>
                                        <span th:if="${r.imageUrl == null}" class="badge bg-light text-dark">Không có</span>

                                        <!-- Modal Image -->
                                        <div th:if="${r.imageUrl != null}" class="modal fade" th:id="'imgModal' + ${r.id}" tabindex="-1" aria-hidden="true">
                                            <div class="modal-dialog modal-dialog-centered modal-lg">
                                                <div class="modal-content border-0 shadow-lg">
                                                    <div class="modal-header border-0 pb-0 bg-light">
                                                        <h5 class="modal-title fw-bold">Chi tiết hình ảnh</h5>
                                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                                    </div>
                                                    <div class="modal-body text-center p-0">
                                                        <img th:src="@{${r.imageUrl}}" class="img-fluid w-100" style="max-height: 80vh; object-fit: contain;" alt="Evidence">
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="badge rounded-pill px-3 py-2" 
                                              th:classappend="${r.status.name() == 'PENDING'} ? 'bg-warning text-dark' : (${r.status.name() == 'PROCESSING'} ? 'bg-primary' : 'bg-success')"
                                              th:text="${r.status.name() == 'PENDING'} ? 'Đang chờ' : (${r.status.name() == 'PROCESSING'} ? 'Đang sửa' : 'Hoàn thành')">
                                        </span>
                                    </td>
                                    <td class="text-muted small" th:text="${#temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
