<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment Portal | Hệ Thống Quản Lý Chung Cư Mini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="gradient-bg d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="glass-card p-5 animate__animated animate__fadeIn" style="max-width: 900px; text-align: center;">
        <h1 class="display-4 fw-bold mb-3">Apartment Portal 2026</h1>
        <p class="lead mb-5 opacity-90">
            Giải pháp quản lý chung cư mini và phòng trọ thông minh.<br>
            Tự động hóa hóa đơn - Minh bạch chi phí - Kết nối nhanh chóng.
        </p>

        <div class="row mb-5">
            <div class="col-md-4">
                <i class="fas fa-bolt feature-icon"></i>
                <h6>Tính điện nước</h6>
            </div>
            <div class="col-md-4">
                <i class="fas fa-file-contract feature-icon"></i>
                <h6>Hợp đồng điện tử</h6>
            </div>
            <div class="col-md-4">
                <i class="fas fa-tools feature-icon"></i>
                <h6>Báo cáo sự cố</h6>
            </div>
        </div>

        <div class="d-flex flex-column flex-md-row justify-content-center">
            <a href="/admin/login" class="btn btn-custom btn-admin">
                <i class="fas fa-user-shield me-2"></i>Dành cho Chủ nhà
            </a>
            <a href="/login" class="btn btn-custom btn-tenant">
                <i class="fas fa-user me-2"></i>Dành cho Người thuê
            </a>
        </div>

        <p class="mt-5 small opacity-75">
            Phát triển bởi Nhóm DAJ2EE - HUTECH University
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
