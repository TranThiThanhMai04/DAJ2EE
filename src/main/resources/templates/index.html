<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment Portal | Hệ Thống Quản Lý Chung Cư Mini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            /* Nền Gradient di chuyển mượt mà */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100 vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            max-width: 900px;
            text-align: center;
        }

        .btn-custom {
            border-radius: 50px;
            padding: 12px 35px;
            font-weight: 600;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px;
        }

        .btn-admin {
            background-color: #ffffff;
            color: #e73c7e;
            border: none;
        }

        .btn-admin:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background-color: #f8f9fa;
        }

        .btn-tenant {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-tenant:hover {
            background: white;
            color: #23a6d5;
            transform: translateY(-3px);
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 15px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="glass-card animate__animated animate__fadeIn">
        <h1 class="display-4 fw-bold mb-3">Apartment Portal 2026</h1>
        <p class="lead mb-5 opacity-90">
            Giải pháp quản lý chung cư mini và phòng trọ thông minh.<br>
            Tự động hóa hóa đơn - Minh bạch chi phí - Kết nối nhanh chóng.
        </p>

        <div class="row mb-5">
            <div class="col-md-4">
                <i class="fas fa-bolt feature-icon"></i>
                <h6>Tính điện nước</h6>
            </div>
            <div class="col-md-4">
                <i class="fas fa-file-contract feature-icon"></i>
                <h6>Hợp đồng điện tử</h6>
            </div>
            <div class="col-md-4">
                <i class="fas fa-tools feature-icon"></i>
                <h6>Báo cáo sự cố</h6>
            </div>
        </div>

        <div class="d-flex flex-column flex-md-row justify-content-center">
            <a href="/login?role=admin" class="btn btn-custom btn-admin">
                <i class="fas fa-user-shield me-2"></i>Dành cho Chủ nhà
            </a>
            <a href="/login?role=tenant" class="btn btn-custom btn-tenant">
                <i class="fas fa-user me-2"></i>Dành cho Người thuê
            </a>
        </div>

        <p class="mt-5 small opacity-75">
            Phát triển bởi Nhóm DAJ2EE - HUTECH University
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
