<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}">
    <meta charset="UTF-8">
    <title>Quản lý phòng trọ</title>
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>

    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
            <div class="container-fluid">
                <span class="navbar-text fw-bold text-dark">Quản lý phòng trọ</span>
                <div class="ms-auto d-flex align-items-center gap-2">
                    <span class="text-muted">Chào, <strong th:text="${fullName}">Admin Panel</strong></span>
                    <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                </div>
            </div>
        </nav>

        <div class="card glass-card border-0 mb-4">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1 fw-bold">Danh sách phòng</h5>
                    <p class="text-muted mb-0">Theo dõi trạng thái đang thuê và phòng trống.</p>
                </div>
                <a href="/admin/rooms/new" class="btn btn-gradient">
                    <i class="fas fa-plus me-2"></i>Thêm phòng
                </a>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <div class="card glass-card border-0">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                        <tr>
                            <th>Mã phòng</th>
                            <th>Giá thuê</th>
                            <th>Diện tích (m2)</th>
                            <th>Trạng thái</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(rooms)}">
                            <td colspan="5" class="text-center text-muted py-4">Chưa có dữ liệu phòng.</td>
                        </tr>
                        <tr th:each="room : ${rooms}">
                            <td class="fw-bold" th:text="${room.roomNumber}">A101</td>
                            <td th:text="${#numbers.formatDecimal(room.monthlyRent, 0, 'COMMA', 0, 'POINT')} + ' VND'">3500000 VND</td>
                            <td th:text="${room.areaM2}">18</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${room.status.name() == 'OCCUPIED'} ? ' bg-soft-warning text-warning' : (${room.status.name() == 'MAINTENANCE'} ? ' bg-soft-danger text-danger' : ' bg-soft-success text-success')"
                                      th:text="${room.status.name() == 'OCCUPIED'} ? 'Đang thuê' : (${room.status.name() == 'MAINTENANCE'} ? 'Bảo trì' : 'Trống')">Trống</span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{'/admin/rooms/' + ${room.id} + '/edit'}" class="btn btn-sm btn-outline-primary me-2">
                                    <i class="fas fa-pen"></i>
                                </a>
                                <form th:action="@{'/admin/rooms/' + ${room.id} + '/delete'}" method="post" class="d-inline"
                                      sec:authorize="hasAuthority('OP_DELETE_ROOM')"
                                      onsubmit="return confirm('Bạn có chắc muốn xóa phòng này?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
