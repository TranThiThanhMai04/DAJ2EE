<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}">
    <meta charset="UTF-8">
    <title>Chỉnh sửa Khách thuê</title>
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>

    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
            <div class="container-fluid">
                <span class="navbar-text fw-bold text-dark">Chỉnh sửa Thông tin Khách thuê</span>
            </div>
        </nav>

        <div class="card glass-card border-0 shadow-sm mx-auto" style="max-width: 800px;">
            <div class="card-header bg-white border-0 pt-4 pb-0">
                <h5 class="fw-bold mb-0">Thông tin Khách thuê</h5>
                <p class="text-muted small">Cập nhật họ tên, sđt, cccd, hoặc mật khẩu</p>
            </div>
            <div class="card-body">
                
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                
                <form th:action="@{'/admin/tenants/edit/' + ${tenantId}}" th:object="${tenantDto}" method="post">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Họ và Tên</label>
                            <input type="text" class="form-control" th:field="*{fullName}" required />
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Số điện thoại (Dùng đăng nhập)</label>
                            <input type="text" class="form-control" th:field="*{phone}" required />
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Số CCCD</label>
                            <input type="text" class="form-control" th:field="*{cccd}" required />
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('cccd')}" th:errors="*{cccd}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" required />
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Đổi Mật khẩu (Không bắt buộc)</label>
                            <input type="password" class="form-control" th:field="*{password}" placeholder="Để trống nếu không đổi..." />
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Xác nhận mật khẩu</label>
                            <input type="password" class="form-control" th:field="*{confirmPassword}" />
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
                        <a href="/admin/tenants" class="btn btn-light border">Hủy bỏ</a>
                        <button type="submit" class="btn btn-gradient px-4">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
