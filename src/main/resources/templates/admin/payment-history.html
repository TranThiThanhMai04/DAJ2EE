<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark" th:text="${tenantName != null ? 'Lịch sử thanh toán - ' + tenantName : 'Lịch sử thanh toán toàn hệ thống'}">
                        Lịch sử thanh toán
                    </span>
                    <div class="ms-auto d-flex align-items-center">
                        <a href="/admin/debts" class="btn btn-outline-secondary btn-sm me-3"><i class="fas fa-arrow-left me-1"></i>Quay lại</a>
                        <span class="me-3 text-muted">Chào, <strong th:text="${#authentication.name}">Admin</strong></span>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="card glass-card border-0">
                    <div class="card-header bg-transparent border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0"><i class="fas fa-receipt me-2 text-success"></i>Giao dịch thành công</h5>
                    </div>
                    <div class="card-body px-4 pb-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Mã GD</th>
                                        <th>Phòng</th>
                                        <th>Hóa đơn</th>
                                        <th>Người Thuê</th>
                                        <th>Số tiền</th>
                                        <th>Ngày TT</th>
                                        <th>Phương thức</th>
                                        <th>Người XN</th>
                                        <th>Ghi chú</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="hist : ${histories}">
                                        <td class="fw-bold text-muted" th:text="'#' + ${hist.id}">#1</td>
                                        <td th:text="${hist.invoice.contract.room.roomNumber}">A-101</td>
                                        <td>
                                            <a th:href="@{/admin/invoices/{id}(id=${hist.invoice.id})}" title="Xem hóa đơn" class="text-decoration-none fw-bold" th:text="${hist.invoice.month + '/' + hist.invoice.year}">04/2026</a>
                                        </td>
                                        <td th:text="${hist.tenant.fullName}">Nguyễn Văn A</td>
                                        <td class="fw-bold text-primary" th:text="${#numbers.formatDecimal(hist.amountPaid, 0, 'COMMA', 0, 'POINT')} + ' đ'">1,000,000 đ</td>
                                        <td th:text="${#temporals.format(hist.paidAt, 'dd/MM/yyyy HH:mm')}">24/03/2026 10:00</td>
                                        <td>
                                            <span class="badge bg-soft-info text-info" th:text="${hist.paymentMethod}">CASH</span>
                                        </td>
                                        <td th:text="${hist.confirmedBy}">admin</td>
                                        <td th:text="${hist.transactionNote}">-</td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(histories)}">
                                        <td colspan="9" class="text-center py-4 text-muted italic">Chưa có giao dịch thanh toán nào.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
