<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper d-flex">
        <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>
        <div id="content" class="flex-grow-1 p-4">
            <h2 class="mb-4" th:text="${room.id != null ? 'Sửa Phòng' : 'Thêm Phòng Mới'}"></h2>
            
            <form th:action="@{/admin/rooms/save}" th:object="${room}" method="post" class="glass-card p-4 rounded">
                <input type="hidden" th:field="*{id}" />
                
                <div class="mb-3">
                    <label for="roomNumber" class="form-label">Số Phòng</label>
                    <input type="text" class="form-control" id="roomNumber" th:field="*{roomNumber}" required>
                </div>
                
                <div class="mb-3">
                    <label for="price" class="form-label">Giá (VND)</label>
                    <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}" required>
                </div>
                
                <div class="mb-3">
                    <label for="status" class="form-label">Trạng thái</label>
                    <select class="form-select" id="status" th:field="*{status}">
                        <option value="Available">Trống (Available)</option>
                        <option value="Rented">Đã thuê (Rented)</option>
                        <option value="Maintenance">Bảo trì (Maintenance)</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary">Lưu</button>
                <a href="/admin/rooms" class="btn btn-secondary">Quay lại</a>
            </form>
        </div>
    </div>
</body>
</html>
