<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <th:block th:replace="~{layouts/fragments :: html_head}"></th:block>
    <title>Danh sách cư dân</title>
</head>
<body class="text-gray-100">
<div class="d-flex">
    <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>
    <div class="flex-grow-1 p-4">
        <div class="mb-4">
            <h2 class="fw-bold">Danh sách cư dân đã duyệt</h2>
            <p class="text-muted">Quản lý thông tin người thuê (TENANT)</p>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Họ và Tên</th>
                        <th>Email</th>
                        <th>Số điện thoại</th>
                        <th>Trạng thái</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${tenants}">
                        <td th:text="${u.fullName}">Tên</td>
                        <td th:text="${u.email}">Email</td>
                        <td th:text="${u.username}">SĐT</td>
                        <td>
                            <span th:text="${u.enabled} ? 'Đã duyệt' : 'Chờ duyệt'"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(tenants)}">
                        <td colspan="4" class="text-center text-muted">Chưa có cư dân nào.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    </div>
</body>
</html>
