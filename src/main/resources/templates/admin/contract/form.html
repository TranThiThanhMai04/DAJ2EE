<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper d-flex">
        <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>
        <div id="content" class="flex-grow-1 p-4">
            <h2 class="mb-4" th:text="${contract.id != null ? 'Sửa Hợp đồng' : 'Tạo Hợp đồng Mới'}"></h2>
            
            <form th:action="@{/admin/contracts/save}" th:object="${contract}" method="post" class="glass-card p-4 rounded">
                <input type="hidden" th:field="*{id}" />
                
                <div class="mb-3">
                    <label for="tenant" class="form-label">Người thuê</label>
                    <select class="form-select" id="tenant" th:field="*{tenant.id}" required>
                        <option value="">-- Chọn khách thuê --</option>
                        <option th:each="t : ${tenants}" th:value="${t.id}" th:text="${t.fullName + ' - ' + t.cccd}"></option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="room" class="form-label">Phòng</label>
                    <select class="form-select" id="room" th:field="*{room.id}" required>
                        <option value="">-- Chọn phòng --</option>
                        <option th:each="r : ${rooms}" th:value="${r.id}" th:text="${r.roomNumber + ' (' + r.price + ' VNĐ)'}"></option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="startDate" class="form-label">Ngày bắt đầu</label>
                    <input type="date" class="form-control" id="startDate" th:field="*{startDate}" required>
                </div>
                
                <div class="mb-3">
                    <label for="endDate" class="form-label">Ngày kết thúc</label>
                    <input type="date" class="form-control" id="endDate" th:field="*{endDate}" required>
                </div>
                
                <div class="mb-3">
                    <label for="price" class="form-label">Giá thuê (VND/tháng)</label>
                    <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}" required>
                </div>
                
                <div class="mb-3">
                    <label for="status" class="form-label">Trạng thái</label>
                    <select class="form-select" id="status" th:field="*{status}">
                        <option value="Active">Đang diễn ra (Active)</option>
                        <option value="Expired">Đã hết hạn (Expired)</option>
                        <option value="Terminated">Đã kết thúc (Terminated)</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary">Lưu</button>
                <a href="/admin/contracts" class="btn btn-secondary">Quay lại</a>
            </form>
        </div>
    </div>
</body>
</html>
