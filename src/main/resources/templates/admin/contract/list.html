<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper d-flex">
        <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>
        <div id="content" class="flex-grow-1 p-4">
            <h2 class="mb-4">Danh sách Hợp đồng</h2>
            
            <div th:if="${successMessage}" class="alert alert-success">
                <span th:text="${successMessage}"></span>
            </div>
            
            <a href="/admin/contracts/add" class="btn btn-primary mb-3">Tạo Hợp đồng Mới</a>
            
            <table class="table table-bordered table-striped glass-card">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Phòng</th>
                        <th>Người thuê</th>
                        <th>Ngày bắt đầu</th>
                        <th>Ngày kết thúc</th>
                        <th>Giá (VND)</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="contract : ${contracts}">
                        <td th:text="${contract.id}"></td>
                        <td th:text="${contract.room.roomNumber}"></td>
                        <td th:text="${contract.tenant.fullName}"></td>
                        <td th:text="${contract.startDate}"></td>
                        <td th:text="${contract.endDate}"></td>
                        <td th:text="${contract.price}"></td>
                        <td>
                            <span class="badge" th:classappend="${contract.status == 'Active' ? 'bg-success' : 'bg-secondary'}" th:text="${contract.status}"></span>
                        </td>
                        <td>
                            <a th:href="@{/admin/contracts/edit/{id}(id=${contract.id})}" class="btn btn-sm btn-warning">Sửa</a>
                            <a th:href="@{/admin/contracts/delete/{id}(id=${contract.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Xóa hợp đồng?');">Xóa</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
