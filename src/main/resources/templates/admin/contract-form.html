<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}">
    <meta charset="UTF-8">
    <title>Tạo Hợp đồng</title>
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4 p-3">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">
                        <i class="fas fa-plus-circle me-2 text-primary"></i> Tạo Hợp đồng thuê phòng mới
                    </span>
                    <div class="ms-auto">
                        <a href="/admin/contracts" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Quay lại</a>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-xl-8 col-lg-10">
                        <div class="card glass-card border-0 shadow-sm">
                            <div class="card-header bg-white border-bottom p-4">
                                <h5 class="fw-bold mb-1">Thông tin chi tiết hợp đồng</h5>
                                <p class="text-muted small mb-0">Cung cấp đầy đủ thông tin để khởi tạo hợp đồng cho khách thuê.</p>
                            </div>
                            <div class="card-body p-4">
                                <div th:if="${errorMessage}" class="alert alert-danger border-0 shadow-sm mb-4">
                                    <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
                                </div>
                                
                                <form th:action="@{/admin/contracts/create}" th:object="${contractDto}" method="post" id="contractForm">
                                    <div class="row g-4">
                                        <!-- Room & Tenant Selection -->
                                        <div class="col-md-6">
                                            <div class="form-floating mb-3">
                                                <select class="form-select shadow-none" th:field="*{roomId}" id="roomId" required>
                                                    <option value="" disabled selected>-- Chọn phòng trống --</option>
                                                    <option th:each="room : ${rooms}" 
                                                            th:value="${room.id}" 
                                                            th:data-price="${room.monthlyRent}"
                                                            th:text="${room.roomNumber} + ' (' + ${#numbers.formatDecimal(room.monthlyRent, 0, 'COMMA', 0, 'POINT')} + ' đ/tháng)'"></option>
                                                </select>
                                                <label for="roomId"><i class="fas fa-door-open me-1"></i> Phòng thuê</label>
                                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('roomId')}" th:errors="*{roomId}"></div>
                                            </div>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="form-floating mb-3">
                                                <select class="form-select shadow-none" th:field="*{tenantId}" id="tenantId" required>
                                                    <option value="" disabled selected>-- Chọn khách thuê --</option>
                                                    <option th:each="t : ${tenants}" 
                                                            th:value="${t.id}" 
                                                            th:data-fullname="${t.fullName}"
                                                            th:text="${t.username} + (${t.fullName != null} ? ' - ' + ${t.fullName} : '')"></option>
                                                </select>
                                                <label for="tenantId"><i class="fas fa-user-tag me-1"></i> Người thuê (Tài khoản)</label>
                                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('tenantId')}" th:errors="*{tenantId}"></div>
                                            </div>
                                        </div>

                                        <!-- Tenant Details in Contract -->
                                        <div class="col-12 mt-0">
                                            <p class="small text-uppercase fw-bold text-muted border-bottom pb-2 mb-3 mt-4" style="letter-spacing: 1px;">Thông tin khách thuê (Theo CCCD)</p>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="form-floating mb-3">
                                                <input type="text" class="form-control shadow-none" th:field="*{tenantFullName}" id="tenantFullName" placeholder="Họ và tên" required />
                                                <label for="tenantFullName">Họ và Tên đầy đủ</label>
                                            </div>
                                        </div>

                                        <div class="col-md-3">
                                            <div class="form-floating mb-3">
                                                <select class="form-select shadow-none" th:field="*{tenantGender}" id="tenantGender" required>
                                                    <option value="Nam">Nam</option>
                                                    <option value="Nữ">Nữ</option>
                                                </select>
                                                <label for="tenantGender">Giới tính</label>
                                            </div>
                                        </div>

                                        <div class="col-md-3">
                                            <div class="form-floating mb-3">
                                                <input type="text" class="form-control shadow-none" th:field="*{tenantHometown}" id="tenantHometown" placeholder="Quê quán" required />
                                                <label for="tenantHometown">Quê quán</label>
                                            </div>
                                        </div>

                                        <!-- Dates & Financials -->
                                        <div class="col-12 mt-0">
                                            <p class="small text-uppercase fw-bold text-muted border-bottom pb-2 mb-3 mt-4" style="letter-spacing: 1px;">Thời hạn & Tài chính</p>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="form-floating mb-3">
                                                <input type="date" class="form-control shadow-none" th:field="*{startDate}" id="startDate" required />
                                                <label for="startDate">Ngày bắt đầu thuê</label>
                                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
                                            </div>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="form-floating mb-3">
                                                <input type="date" class="form-control shadow-none" th:field="*{endDate}" id="endDate" required />
                                                <label for="endDate">Ngày hết hạn hợp đồng</label>
                                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
                                            </div>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="input-group mb-3">
                                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-piggy-bank text-muted"></i></span>
                                                <div class="form-floating flex-grow-1">
                                                    <input type="number" step="1000" class="form-control border-start-0 shadow-none" th:field="*{deposit}" id="deposit" placeholder="Tiền cọc" required />
                                                    <label for="deposit">Tiền đặt cọc (VNĐ)</label>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="input-group mb-3">
                                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-money-bill-wave text-primary"></i></span>
                                                <div class="form-floating flex-grow-1">
                                                    <input type="number" step="1000" class="form-control border-start-0 shadow-none" th:field="*{monthlyRent}" id="monthlyRent" placeholder="Giá thuê" required />
                                                    <label for="monthlyRent">Giá thuê/tháng (VNĐ)</label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="d-grid gap-2 mt-4">
                                        <button type="submit" class="btn btn-primary py-3 fw-bold border-0" style="background: linear-gradient(90deg, #3333ff, #7928ca); border-radius: 12px; font-size: 1.1rem;">
                                            <i class="fas fa-save me-2"></i> LƯU VÀ PHÁT HÀNH HỢP ĐỒNG
                                        </button>
                                        <button type="reset" class="btn btn-link text-muted btn-sm mt-1">Làm lại form</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const roomSelect = document.getElementById('roomId');
            const monthlyRentInput = document.getElementById('monthlyRent');
            const tenantSelect = document.getElementById('tenantId');
            const tenantFullName = document.getElementById('tenantFullName');
            
            roomSelect.addEventListener('change', function() {
                const selectedOption = this.options[this.selectedIndex];
                const price = selectedOption.getAttribute('data-price');
                if (price) {
                    monthlyRentInput.value = Math.round(price);
                }
            });

            tenantSelect.addEventListener('change', function() {
                const selectedOption = this.options[this.selectedIndex];
                const fullName = selectedOption.getAttribute('data-fullname');
                if (fullName) {
                    tenantFullName.value = fullName;
                }
            });

            // Gán ngày mặc định (ngày hôm nay cho ngày bắt đầu)
            if(!document.getElementById('startDate').value) {
                const now = new Date();
                const today = now.toISOString().split('T')[0];
                document.getElementById('startDate').value = today;
                
                // Mặc định kết thúc sau 1 năm
                const nextYear = new Date();
                nextYear.setFullYear(now.getFullYear() + 1);
                document.getElementById('endDate').value = nextYear.toISOString().split('T')[0];
            }
        });
    </script>
</body>
</html>
</body>
</html>
