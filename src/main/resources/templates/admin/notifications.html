<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">Hệ thống Quản lý Chung cư</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 text-muted">Chào, <strong th:text="${fullName}">Admin</strong></span>
                        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                    </div>
                </div>
            </nav>

            <div class="card glass-card border-0 mt-2">
                <div class="card-header bg-transparent border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0">Gửi Thông Báo Mới</h5>
                </div>
                <div class="card-body px-4 pb-4">
                    <form th:action="@{/admin/notifications/send}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Tiêu đề</label>
                                <input type="text" name="title" class="form-control" required placeholder="Nhập tiêu đề...">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-bold">Loại thông báo</label>
                                <select name="type" class="form-select">
                                    <option value="Bảo trì">Bảo trì</option>
                                    <option value="Nhắc đóng tiền">Nhắc đóng tiền</option>
                                    <option value="Khác">Thông báo chung</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-bold">Người nhận</label>
                                <select name="tenantId" class="form-select">
                                    <option value="">Tất cả người thuê</option>
                                    <option th:each="tenant : ${tenants}" th:value="${tenant.id}" th:text="|Phòng ${tenant.username} - ${tenant.fullName}|"></option>
                                </select>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">Nội dung</label>
                                <textarea name="message" class="form-control" rows="4" required placeholder="Nhập nội dung..."></textarea>
                            </div>
                            <div class="col-md-12 text-end">
                                <button type="submit" class="btn btn-primary px-4 rounded-pill"><i class="fas fa-paper-plane me-2"></i>Gửi thông báo</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card glass-card border-0 mt-4">
                <div class="card-header bg-transparent border-0 pt-4 px-4">
                    <h5 class="fw-bold mb-0">Lịch Sử Gửi Thông Báo</h5>
                </div>
                <div class="card-body px-4 pb-4">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Thời gian</th>
                                <th>Người nhận</th>
                                <th>Tiêu đề</th>
                                <th>Loại</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="nt : ${history}">
                                <td th:text="${#temporals.format(nt.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                <td class="fw-bold" th:text="${nt.tenant != null ? nt.tenant.fullName : 'Tất cả người thuê'}"></td>
                                <td th:text="${nt.title}"></td>
                                <td><span class="badge bg-soft-primary" th:text="${nt.type}"></span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
