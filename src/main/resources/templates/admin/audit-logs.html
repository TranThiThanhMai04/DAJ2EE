<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body class="bg-light">
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4 mx-3 mt-3">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark fs-5">
                        <i class="fas fa-fingerprint me-2 text-primary"></i>Nhật ký hệ thống
                    </span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 text-muted">Hệ thống & Bảo mật <i class="fas fa-shield-alt ms-1"></i></span>
                    </div>
                </div>
            </nav>

            <div class="container-fluid px-4">
                <div class="card glass-card border-0 shadow-sm">
                    <div class="card-header bg-primary text-white py-3 px-4 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0"><i class="fas fa-list-ul me-2"></i>Lịch sử hoạt động</h5>
                        <span class="badge bg-white text-primary rounded-pill px-3 py-2" th:text="${logs != null ? logs.size() : 0} + ' bản ghi'">0 bản ghi</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light text-muted small text-uppercase fw-bold">
                                    <tr>
                                        <th class="ps-4">Thời gian</th>
                                        <th>Người thực hiện</th>
                                        <th>Hành động</th>
                                        <th>Chi tiết</th>
                                        <th class="text-end pe-4">ID</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="log : ${logs}" class="border-bottom">
                                        <td class="ps-4">
                                            <div class="d-flex align-items-center">
                                                <div class="bg-soft-primary text-primary rounded-circle p-2 me-3 d-none d-sm-block">
                                                    <i class="fas fa-clock small"></i>
                                                </div>
                                                <div>
                                                    <span class="fw-bold d-block" th:text="${#temporals.format(log.timestamp, 'dd/MM/yyyy HH:mm:ss')}">07/04/2026 20:41</span>
                                                    <small class="text-muted" th:text="${'Vừa xong'}">Vừa xong</small>
                                                </div>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <img th:src="${'https://ui-avatars.com/api/?name=' + log.username + '&background=random&color=fff'}" class="rounded-circle me-2" width="24" height="24">
                                                <span class="fw-bold text-dark" th:text="${log.username}">admin</span>
                                            </div>
                                        </td>
                                        <td>
                                            <span class="badge rounded-pill px-3 py-2" 
                                                  th:classappend="${log.action.contains('Xóa') || log.action.contains('Từ chối') ? 'bg-soft-danger text-danger' : 
                                                                  (log.action.contains('Cập nhật') || log.action.contains('Sửa') ? 'bg-soft-warning text-warning' : 
                                                                  (log.action.contains('Phê duyệt') || log.action.contains('Thêm mới') ? 'bg-soft-success text-success' : 'bg-soft-primary text-primary'))}"
                                                  th:text="${log.action}">Hành động</span>
                                        </td>
                                        <td>
                                            <span class="text-muted" th:text="${log.details}">Chi tiết hành động thực hiện...</span>
                                        </td>
                                        <td class="text-end pe-4">
                                            <small class="text-muted fw-bold" th:text="${'#' + log.id}">#123</small>
                                        </td>
                                    </tr>
                                    <tr th:if="${logs == null or logs.isEmpty()}">
                                        <td colspan="5" class="text-center py-5">
                                            <div class="py-4 opacity-50">
                                                <i class="fas fa-history fa-3x mb-3 text-muted"></i>
                                                <h6 class="text-muted">Chưa có dữ liệu nhật ký hệ thống.</h6>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .bg-soft-primary { background-color: rgba(13, 110, 253, 0.1); }
        .bg-soft-success { background-color: rgba(25, 135, 84, 0.1); }
        .bg-soft-warning { background-color: rgba(255, 193, 7, 0.1); }
        .bg-soft-danger { background-color: rgba(220, 53, 69, 0.1); }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</body>
</html>
