<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper d-flex">
        <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>
        <div id="content" class="flex-grow-1 p-4">
            <h2 class="mb-4" th:text="${tenant.id != null ? 'Sửa Người Thuê' : 'Thêm Người Thuê Mới'}"></h2>
            
            <form th:action="@{/admin/tenants/save}" th:object="${tenant}" method="post" class="glass-card p-4 rounded">
                <input type="hidden" th:field="*{id}" />
                
                <div class="mb-3">
                    <label for="fullName" class="form-label">Họ Tên</label>
                    <input type="text" class="form-control" id="fullName" th:field="*{fullName}" required>
                </div>
                
                <div class="mb-3">
                    <label for="cccd" class="form-label">CCCD</label>
                    <input type="text" class="form-control" id="cccd" th:field="*{cccd}" required>
                </div>
                
                <div class="mb-3">
                    <label for="phoneNumber" class="form-label">Số điện thoại</label>
                    <input type="text" class="form-control" id="phoneNumber" th:field="*{phoneNumber}" required>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email (Tùy chọn)</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}">
                </div>
                
                <button type="submit" class="btn btn-primary">Lưu</button>
                <a href="/admin/tenants" class="btn btn-secondary">Quay lại</a>
            </form>
        </div>
    </div>
</body>
</html>
