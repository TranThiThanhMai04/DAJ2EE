<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}">
    <!-- CSS Bootstrap & FontAwesome cho Live Server (Preview) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../static/css/style.css">
</head>
<body>

    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: admin_sidebar}">
            <!-- Xem trước khi code (Static preview) -->
            <div id="sidebar" style="min-width: 280px; background: linear-gradient(180deg, #ff0080, #7928ca, #3333ff); height: 100vh; padding: 20px;">
                <h4 style="color:white; font-weight: bold;"><i class="fas fa-user-shield me-2"></i>Sidebar Preview</h4>
                <ul class="list-unstyled mt-4" style="color: rgba(255,255,255,0.8);">
                    <li class="mb-3"><i class="fas fa-chart-line me-2"></i> Dashboard</li>
                    <li class="mb-3"><i class="fas fa-home me-2"></i> Rooms</li>
                </ul>
            </div>
        </div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">Hệ thống Quản lý Chung cư Mini 2026</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 text-muted">Chào, <strong th:text="${fullName}">Admin A</strong></span>
                        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                    </div>
                </div>
            </nav>

            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card glass-card border-0 p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted text-uppercase small fw-bold">Total Rooms</h6>
                                <h2 class="fw-bold mb-0">24</h2>
                            </div>
                            <div class="card-icon bg-soft-primary">
                                <i class="fas fa-home"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card glass-card border-0 p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted text-uppercase small fw-bold">Monthly Revenue</h6>
                                <h2 class="fw-bold mb-0">45.5M</h2>
                            </div>
                            <div class="card-icon bg-soft-success">
                                <i class="fas fa-dollar-sign"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card glass-card border-0 p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted text-uppercase small fw-bold">Maintenance Requests</h6>
                                <h2 class="fw-bold mb-0 text-danger">03</h2>
                            </div>
                            <div class="card-icon bg-soft-danger">
                                <i class="fas fa-tools"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card glass-card border-0 mt-2">
                <div class="card-header bg-transparent border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0">Recent Transactions</h5>
                    <button class="btn btn-sm btn-light rounded-pill px-3">View All</button>
                </div>
                <div class="card-body px-4 pb-4">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Room</th>
                                    <th>Tenant</th>
                                    <th>Date</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="fw-bold">A-101</td>
                                    <td>Phạm Ngân</td>
                                    <td>18/03/2026</td>
                                    <td class="fw-bold text-dark">3.500.000đ</td>
                                    <td><span class="badge bg-soft-success">Paid</span></td>
                                </tr>
                                <tr>
                                    <td class="fw-bold">B-202</td>
                                    <td>Nguyễn Mạnh</td>
                                    <td>17/03/2026</td>
                                    <td class="fw-bold text-dark">2.800.000đ</td>
                                    <td><span class="badge bg-soft-warning text-warning">Pending</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
