<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">Báo Cáo (Liêu)</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 text-muted">Chào, <strong th:text="${#authentication.name}">Admin</strong></span>
                        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="row">
                    <!-- Form Gửi thông báo chung/từng phòng -->
                    <div class="col-lg-12">
                        <div class="card glass-card border-0 p-4 shadow-sm mb-4">
                            <h5 class="fw-bold mb-4"><i class="fas fa-envelope-open-text me-2 text-primary"></i>Gửi Thông Báo / Báo Cáo</h5>
                            <form id="reportForm">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label small fw-bold">Tiêu đề</label>
                                        <input type="text" class="form-control rounded-pill" id="notifyTitle" required placeholder="Nhập tiêu đề...">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label small fw-bold">Đối tượng nhận</label>
                                        <select class="form-select rounded-pill" id="targetType">
                                            <option value="ALL">Toàn bộ Người thuê</option>
                                            <option value="ROOM">Gửi cho từng phòng cụ thể</option>
                                        </select>
                                    </div>
                                    <div class="col-md-12 mb-3 d-none" id="roomSelection">
                                        <label class="form-label small fw-bold">Chọn phòng (Chỉ phòng đang thuê)</label>
                                        <select class="form-select rounded-pill" id="roomId">
                                            <option th:each="room : ${rooms}" 
                                                    th:value="${room.id}" 
                                                    th:text="'Phòng: ' + ${room.roomNumber} + ' (' + ${room.status} + ')'"></option>
                                        </select>
                                    </div>
                                    <div class="col-md-12 mb-4">
                                        <label class="form-label small fw-bold">Nội dung chi tiết</label>
                                        <textarea class="form-control rounded-3" id="notifyContent" rows="6" required placeholder="Nhập nội dung báo cáo hoặc thông báo tại đây..."></textarea>
                                    </div>
                                </div>
                                <div class="text-end">
                                    <button type="submit" class="btn btn-primary rounded-pill px-5 fw-bold shadow-sm">
                                        <i class="fas fa-paper-plane me-2"></i>Gửi ngay
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script th:inline="javascript">
        // Dropdown room list is now handled by Thymeleaf server-side.

        // Hiện/ẩn Room Selection
        document.getElementById('targetType').addEventListener('change', function() {
            const roomDiv = document.getElementById('roomSelection');
            if(this.value === 'ROOM') {
                roomDiv.classList.remove('d-none');
                roomDiv.style.display = 'block';
            } else {
                roomDiv.classList.add('d-none');
                roomDiv.style.display = 'none';
            }
        });

        // Submit Form
        document.getElementById('reportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const type = document.getElementById('targetType').value;
            const url = type === 'ALL' ? '/admin/notifications/send-all' : '/admin/notifications/send-to-room';
            
            const payload = {
                title: document.getElementById('notifyTitle').value,
                content: document.getElementById('notifyContent').value,
                roomId: type === 'ROOM' ? document.getElementById('roomId').value : null
            };

            const btn = this.querySelector('button');
            btn.disabled = true;

            const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

            fetch(url, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify(payload)
            }).then(res => {
                if(res.ok) {
                    Swal.fire('Thành công', 'Đã chuyển thông báo đi!', 'success');
                    this.reset();
                    document.getElementById('roomSelection').classList.add('d-none');
                } else {
                    res.text().then(text => {
                        console.error('Server response:', text);
                        Swal.fire('Thất bại', 'Có lỗi xảy ra: ' + (text || res.status), 'error');
                    });
                }
            }).catch(err => {
                console.error('Fetch error:', err);
                Swal.fire('Thất bại', 'Lỗi kết nối: ' + err.message, 'error');
            }).finally(() => {
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
