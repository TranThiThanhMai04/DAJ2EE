<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">Báo cáo Doanh thu</span>
                    <div class="ms-auto">
                        <span class="navbar-text" th:text="${#authentication.name}">Admin</span>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="card glass-card border-0 mb-4 p-4">
                    <form th:action="@{/admin/reports}" method="get" class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Tháng</label>
                            <input type="number" name="month" class="form-control rounded-pill shadow-none" min="1" max="12" th:value="${month}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Năm</label>
                            <input type="number" name="year" class="form-control rounded-pill shadow-none" th:value="${year}">
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-primary rounded-pill px-4 w-100"><i class="fas fa-search me-2"></i>Xem báo cáo</button>
                        </div>
                    </form>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-4">
                        <div class="card glass-card border-0 p-4 bg-primary text-white">
                            <h6 class="text-uppercase small fw-bold opacity-75">Doanh thu đã thu</h6>
                            <h2 class="fw-bold mb-0" th:text="${#numbers.formatDecimal(revenue, 0, 'COMMA', 0, 'POINT') + ' đ'}">45.000.000 đ</h2>
                            <p class="small mt-2 mb-0">Tháng <span th:text="${month}">3</span> / <span th:text="${year}">2026</span></p>
                        </div>
                    </div>
                </div>

                <!-- Add a chart placeholder if needed -->
                <div class="card glass-card border-0 p-4 text-center py-5">
                    <i class="fas fa-chart-bar fa-4x text-muted opacity-25 mb-3"></i>
                    <p class="text-muted italic">Biểu đồ trực quan sẽ được tích hợp trong bản cập nhật tiếp theo.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
