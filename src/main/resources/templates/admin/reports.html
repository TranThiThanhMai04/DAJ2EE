<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">Hệ thống Quản lý Chung cư</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 text-muted">Chào, <strong th:text="${fullName}">Admin</strong></span>
                        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                    </div>
                </div>
            </nav>

            <div class="row">
                <div class="col-md-7 mb-4">
                    <div class="card glass-card border-0 p-4 h-100">
                        <div class="card-header bg-transparent border-0 pt-0 px-0 d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold mb-0">Báo Cáo Doanh Thu Theo Tháng</h5>
                        </div>
                        <div class="card-body px-0 pb-0">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Tháng/Năm</th>
                                        <th class="text-end">Tổng Doanh Thu</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="rev : ${revenueMonthly}">
                                        <td class="fw-bold text-dark" th:text="|${rev[0]}/${rev[1]}|"></td>
                                        <td class="text-end fw-bold text-success" th:text="${#numbers.formatDecimal(rev[2], 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(revenueMonthly)}">
                                        <td colspan="2" class="text-center text-muted">Chưa có dữ liệu thanh toán</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="col-md-5 mb-4">
                    <div class="card glass-card border-0 p-4 h-100">
                        <div class="card-header bg-transparent border-0 pt-0 px-0">
                            <h5 class="fw-bold mb-0">Tạo Hóa Đơn Ảo</h5>
                            <small class="text-muted">Tính năng mồi dữ liệu (mocking) để test</small>
                        </div>
                        <div class="card-body px-0 pb-0">
                            <form th:action="@{/admin/reports/add-invoice}" method="post">
                                <div class="mb-2">
                                    <label class="form-label">Người thuê</label>
                                    <select name="tenantId" class="form-select form-select-sm" required>
                                        <option th:each="tenant : ${tenants}" th:value="${tenant.id}" th:text="|Phòng ${tenant.username} - ${tenant.fullName}|"></option>
                                    </select>
                                </div>
                                <div class="row mb-2">
                                    <div class="col-6">
                                        <label class="form-label">Tháng</label>
                                        <input type="number" name="month" class="form-control form-control-sm" value="3" required>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label">Năm</label>
                                        <input type="number" name="year" class="form-control form-control-sm" value="2026" required>
                                    </div>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label">Tiền phòng</label>
                                    <input type="number" name="rentAmount" class="form-control form-control-sm" value="3500000" required>
                                </div>
                                <div class="row mb-2">
                                    <div class="col-6">
                                        <label class="form-label">Điện (số)</label>
                                        <input type="number" name="electricUsage" class="form-control form-control-sm" value="100">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label">Tiền Điện</label>
                                        <input type="number" name="electricCost" class="form-control form-control-sm" value="300000">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-6">
                                        <label class="form-label">Nước (khối)</label>
                                        <input type="number" name="waterUsage" class="form-control form-control-sm" value="12">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label">Tiền Nước</label>
                                        <input type="number" name="waterCost" class="form-control form-control-sm" value="120000">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary btn-sm w-100">Thêm Hóa Đơn (Đã thu)</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
