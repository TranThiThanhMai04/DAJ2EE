<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}"></head>
<body>
    <div class="admin-wrapper">
        <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
                <div class="container-fluid">
                    <span class="navbar-text fw-bold text-dark">Quản lý Hóa đơn</span>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 text-muted">Chào, <strong th:text="${#authentication.name}">Admin</strong></span>
                        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0 text-dark"><i class="fas fa-file-invoice-dollar me-2 text-primary"></i>Danh sách Hóa đơn</h5>
                    <a href="/admin/invoices/create" class="btn btn-primary rounded-pill px-4 shadow-sm border-0" style="background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); transition: all 0.3s ease;">
                        <i class="fas fa-plus-circle me-2"></i> Tạo hóa đơn mới
                    </a>
                </div>

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4 shadow-sm border-0" role="alert" style="background: rgba(25, 135, 84, 0.1); color: #198754;">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-4 shadow-sm border-0" role="alert" style="background: rgba(220, 53, 69, 0.1); color: #dc3545;">
                    <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card glass-card border-0">
                    <div class="card-header bg-transparent border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0"><i class="fas fa-list me-2"></i>Danh sách Hóa đơn</h5>
                    </div>
                    <div class="card-body px-4 pb-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Phòng</th>
                                        <th>Kỳ hạn</th>
                                        <th>Ngày phát hành</th>
                                        <th>Hạn chót</th>
                                        <th>Tổng tiền</th>
                                        <th>Trạng thái</th>
                                        <th>Hành động</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="invoice : ${invoices}">
                                        <td th:text="${invoice.id}">1</td>
                                        <td th:text="${invoice.contract?.room?.roomNumber ?: 'Trống'}" class="fw-bold">A-101</td>
                                        <td th:text="${invoice.month + '/' + invoice.year}">03/2026</td>
                                        <td th:text="${#dates.format(invoice.issueDate, 'dd/MM/yyyy')}">23/03/2026</td>
                                        <td th:text="${#dates.format(invoice.dueDate, 'dd/MM/yyyy')}" class="text-danger fw-bold">30/03/2026</td>
                                        <td class="fw-bold text-primary" th:text="${#numbers.formatDecimal(invoice.totalAmount, 0, 'COMMA', 0, 'POINT') + ' đ'}">3,500,000 đ</td>
                                        <td>
                                            <span th:if="${invoice.paymentStatus.name() == 'PAID'}" class="badge bg-soft-success">Đã thanh toán</span>
                                            <span th:if="${invoice.paymentStatus.name() == 'UNPAID'}" class="badge bg-soft-warning text-warning">Chưa thanh toán</span>
                                            <span th:if="${invoice.paymentStatus.name() == 'OVERDUE'}" class="badge bg-soft-danger">Quá hạn</span>
                                        </td>
                                        <td>
                                            <form th:if="${invoice.paymentStatus.name() != 'PAID'}" th:action="@{/admin/debts/pay}" method="post" style="display:inline;">
                                                <input type="hidden" name="invoiceId" th:value="${invoice.id}" />
                                                <input th:if="${invoice.contract != null and invoice.contract.tenant != null}" type="hidden" name="tenantId" th:value="${invoice.contract.tenant.id}" />
                                                <input th:unless="${invoice.contract != null and invoice.contract.tenant != null}" type="hidden" name="tenantId" value="0" />
                                                <select name="method" class="form-select form-select-sm d-inline-block w-auto rounded-pill mx-1" required>
                                                    <option value="CASH">Tiền mặt</option>
                                                    <option value="TRANSFER">Chuyển khoản</option>
                                                </select>
                                                <button type="submit" class="btn btn-sm btn-outline-success rounded-pill px-3">Xác nhận thanh toán</button>
                                            </form>
                                            <a th:href="@{/admin/invoices/{id}(id=${invoice.id})}" class="btn btn-sm btn-outline-primary rounded-pill px-3"><i class="fas fa-eye"></i></a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(invoices)}">
                                        <td colspan="6" class="text-center py-4 text-muted italic">Chưa có hóa đơn nào được tạo.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const services = /*[[${services}]]*/ [];
        const elecPrice = services.find(s => s.name === 'Điện')?.pricePerUnit || 3500;
        const waterPrice = services.find(s => s.name === 'Nước')?.pricePerUnit || 15000;

        const roomSelect = document.getElementById('roomId');
        const monthInput = document.getElementById('month');
        const yearInput = document.getElementById('year');
        const readingsSection = document.querySelector('.readings-section');
        
        const oldElecSpan = document.getElementById('oldElec');
        const oldWaterSpan = document.getElementById('oldWater');
        const elecReadingInput = document.getElementById('elecReading');
        const waterReadingInput = document.getElementById('waterReading');
        const elecAmountSpan = document.getElementById('elecAmount');
        const waterAmountSpan = document.getElementById('waterAmount');

        async function updateLatestReadings() {
            const roomId = roomSelect.value;
            const month = monthInput.value;
            const year = yearInput.value;

            if (roomId && month && year) {
                try {
                    const response = await fetch(`/admin/invoices/latest-readings?roomId=${roomId}&month=${month}&year=${year}`);
                    const data = await response.json();
                    
                    oldElecSpan.textContent = data.lastElecReading || 0;
                    oldWaterSpan.textContent = data.lastWaterReading || 0;
                    
                    readingsSection.style.display = 'flex';
                    calculateAmounts();
                } catch (error) {
                    console.error('Error fetching readings:', error);
                }
            }
        }

        function calculateAmounts() {
            const oldElec = parseInt(oldElecSpan.textContent) || 0;
            const newElec = parseInt(elecReadingInput.value) || 0;
            const oldWater = parseInt(oldWaterSpan.textContent) || 0;
            const newWater = parseInt(waterReadingInput.value) || 0;

            const elecDiff = Math.max(0, newElec - oldElec);
            const waterDiff = Math.max(0, newWater - oldWater);

            elecAmountSpan.textContent = (elecDiff * elecPrice).toLocaleString('vi-VN') + ' đ';
            waterAmountSpan.textContent = (waterDiff * waterPrice).toLocaleString('vi-VN') + ' đ';
            
            if (newElec > 0 && newElec < oldElec) {
                elecReadingInput.classList.add('is-invalid');
            } else {
                elecReadingInput.classList.remove('is-invalid');
            }
            
            if (newWater > 0 && newWater < oldWater) {
                waterReadingInput.classList.add('is-invalid');
            } else {
                waterReadingInput.classList.remove('is-invalid');
            }
        }

        roomSelect.addEventListener('change', updateLatestReadings);
        monthInput.addEventListener('change', updateLatestReadings);
        yearInput.addEventListener('change', updateLatestReadings);
        elecReadingInput.addEventListener('input', calculateAmounts);
        waterReadingInput.addEventListener('input', calculateAmounts);
        /*]]>*/
    </script>
    <style>
        .bg-soft-primary { background-color: rgba(13, 110, 253, 0.1); }
        .bg-soft-warning { background-color: rgba(255, 193, 7, 0.1); }
        .bg-soft-success { background-color: rgba(25, 135, 84, 0.1); }
        .bg-soft-danger { background-color: rgba(220, 53, 69, 0.1); }
    </style>
</body>
</html>
