<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}">
    <meta charset="UTF-8">
    <title>Biểu mẫu phòng trọ</title>
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>

    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
            <div class="container-fluid">
                <span class="navbar-text fw-bold text-dark" th:text="${formTitle}">Thêm phòng trọ</span>
                <div class="ms-auto d-flex align-items-center gap-2">
                    <span class="text-muted">Chào, <strong th:text="${fullName}">Admin Panel</strong></span>
                    <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                </div>
            </div>
        </nav>

        <div class="card glass-card border-0">
            <div class="card-body p-4">
                <form th:object="${room}" th:action="${submitUrl}" method="post" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Mã phòng</label>
                            <input type="text" class="form-control" th:field="*{roomNumber}" placeholder="Ví dụ: A101">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('roomNumber')}" th:errors="*{roomNumber}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Giá thuê (VND)</label>
                            <input type="number" min="0" step="1000" class="form-control" th:field="*{monthlyRent}" placeholder="Ví dụ: 3500000">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('monthlyRent')}" th:errors="*{monthlyRent}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Diện tích (m2)</label>
                            <input type="number" min="0.1" step="0.1" class="form-control" th:field="*{areaM2}" placeholder="Ví dụ: 18">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('areaM2')}" th:errors="*{areaM2}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Trạng thái</label>
                            <select class="form-select" th:field="*{status}">
                                <option th:each="status : ${statuses}" th:value="${status}"
                                        th:text="${status.name() == 'OCCUPIED'} ? 'Đang thuê' : (${status.name() == 'MAINTENANCE'} ? 'Bảo trì' : 'Trống')"></option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold">Ghi chú</label>
                            <textarea class="form-control" rows="3" th:field="*{note}" placeholder="Ghi chú thêm nếu cần"></textarea>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-gradient">
                            <i class="fas fa-save me-2"></i>Lưu
                        </button>
                        <a href="/admin/rooms" class="btn btn-outline-secondary">Quay lại</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
