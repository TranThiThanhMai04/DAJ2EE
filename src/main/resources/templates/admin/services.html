<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}">
    <meta charset="UTF-8">
    <title>Quản lý điện nước</title>
</head>
<body>
<div class="admin-wrapper">
    <div th:replace="~{layouts/fragments :: admin_sidebar}"></div>

    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded-3 mb-4">
            <div class="container-fluid">
                <span class="navbar-text fw-bold text-dark">Quản lý điện nước</span>
                <div class="ms-auto d-flex align-items-center gap-2">
                    <span class="text-muted">Chào, <strong th:text="${fullName}">Admin Panel</strong></span>
                    <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="fas fa-power-off"></i></a>
                </div>
            </div>
        </nav>

        <div class="card glass-card border-0 mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h5 class="mb-1 fw-bold">Nhập chỉ số điện nước</h5>
                        <p class="text-muted mb-0">Cập nhật chỉ số tiêu thụ hàng tháng cho từng phòng.</p>
                    </div>
                </div>

                <form th:action="@{/admin/services}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label for="month" class="form-label small fw-bold">Tháng</label>
                        <select name="month" id="month" class="form-select shadow-none border-2">
                            <option th:each="m : ${#numbers.sequence(1, 12)}" 
                                    th:value="${m}" th:text="'Tháng ' + ${m}"
                                    th:selected="${m == selectedMonth}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="year" class="form-label small fw-bold">Năm</label>
                        <select name="year" id="year" class="form-select shadow-none border-2">
                            <option th:each="y : ${#numbers.sequence(2024, 2030)}" 
                                    th:value="${y}" th:text="${y}"
                                    th:selected="${y == selectedYear}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-search me-2"></i>Xem
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/admin/services/save}" method="post">
            <input type="hidden" name="month" th:value="${selectedMonth}">
            <input type="hidden" name="year" th:value="${selectedYear}">
            
            <div class="card glass-card border-0">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Mã phòng</th>
                                <th>Trạng thái</th>
                                <th style="width: 25%;">Chỉ số Điện (kWh)</th>
                                <th style="width: 25%;">Chỉ số Nước (m3)</th>
                                <th style="width: 15%;">Số tiền (đ)</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(rooms)}">
                                <td colspan="4" class="text-center text-muted py-4">Chưa có dữ liệu phòng.</td>
                            </tr>
                            <tr th:each="room : ${rooms}">
                                <td class="fw-bold" th:text="${room.roomNumber}">A101</td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${room.status.name() == 'OCCUPIED'} ? ' bg-soft-warning text-warning' : (${room.status.name() == 'MAINTENANCE'} ? ' bg-soft-danger text-danger' : ' bg-soft-success text-success')"
                                          th:text="${room.status.name() == 'OCCUPIED'} ? 'Đang thuê' : (${room.status.name() == 'MAINTENANCE'} ? 'Bảo trì' : 'Trống')">Trống</span>
                                </td>
                                <td>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text"><i class="fas fa-bolt text-warning"></i></span>
                                        <input type="number" th:name="'elec_' + ${room.id}" 
                                               th:value="${readings.get(room.id + '_Điện')}"
                                               class="form-control" placeholder="0" min="0">
                                    </div>
                                </td>
                                <td>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text"><i class="fas fa-tint text-primary"></i></span>
                                        <input type="number" th:name="'water_' + ${room.id}" 
                                               th:value="${readings.get(room.id + '_Nước')}"
                                               class="form-control" placeholder="0" min="0">
                                    </div>
                                </td>
                                <td>
                                    <span th:text="${amounts.get(room.id + '_Điện') != null ? #numbers.formatDecimal(amounts.get(room.id + '_Điện'), 0, 'COMMA', 2, 'POINT') : '0.00'}">0.00</span>
                                    <br/>
                                    <small class="text-muted">(Điện)</small>
                                    <div>
                                      <span th:text="${amounts.get(room.id + '_Nước') != null ? #numbers.formatDecimal(amounts.get(room.id + '_Nước'), 0, 'COMMA', 2, 'POINT') : '0.00'}">0.00</span>
                                      <br/>
                                      <small class="text-muted">(Nước)</small>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-gradient px-5">
                            <i class="fas fa-save me-2"></i>Lưu tất cả
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
