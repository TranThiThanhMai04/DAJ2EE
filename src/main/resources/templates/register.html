<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}">
    <title>Đăng ký Cư dân | Apartment Portal</title>
</head>
<body class="gradient-bg d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 50px 0;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card glass-card-login border-0 p-4 shadow-lg">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-white">ĐĂNG KÝ TÀI KHOẢN</h2>
                            <p class="text-white-50 small">Vui lòng điền chính xác thông tin để làm hợp đồng</p>
                        </div>

                        <form th:action="@{/register}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold text-white">Họ và Tên</label>
                                    <input type="text" name="fullName" class="form-control border-0 bg-white bg-opacity-10 text-white" placeholder="Nguyễn Văn A" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold text-white">Số điện thoại</label>
                                    <input type="text" name="phone" class="form-control border-0 bg-white bg-opacity-10 text-white" placeholder="09xx..." required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold text-white">Email</label>
                                    <input type="email" name="email" class="form-control border-0 bg-white bg-opacity-10 text-white" placeholder="vi-du@gmail.com" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold text-white">Số CCCD (12 số)</label>
                                    <input type="text" name="cccd" class="form-control border-0 bg-white bg-opacity-10 text-white" placeholder="040..." required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold text-white">Mật khẩu</label>
                                    <input type="password" name="password" class="form-control border-0 bg-white bg-opacity-10 text-white" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold text-white">Xác nhận mật khẩu</label>
                                    <input type="password" name="confirmPassword" class="form-control border-0 bg-white bg-opacity-10 text-white" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label small fw-bold text-white">Mã phòng dự kiến (Nếu có)</label>
                                <input type="text" name="roomNumber" class="form-control border-0 bg-white bg-opacity-10 text-white" placeholder="Ví dụ: A-101">
                            </div>

                            <button type="submit" class="btn btn-gradient w-100 py-2 fw-bold shadow">HOÀN TẤT ĐĂNG KÝ</button>
                        </form>

                        <div class="text-center mt-4">
                            <span class="small text-white-50">Đã có tài khoản?</span>
                            <a href="/login" class="small fw-bold text-white text-decoration-none ms-1">Đăng nhập ngay</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
