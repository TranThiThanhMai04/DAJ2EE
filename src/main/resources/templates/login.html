<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layouts/fragments :: html_head}">
    <title>Đăng nhập Cư dân | Apartment Portal</title>
</head>
<body class="gradient-bg d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card glass-card-login border-0 p-4 shadow-lg">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-white">ĐĂNG NHẬP</h2>
                            <p class="text-white-50 small">Dành cho cư dân Chung cư Mini</p>
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-white">Số điện thoại / Email</label>
                                <input type="text" name="username" class="form-control border-0 bg-white bg-opacity-10 text-white py-2" placeholder="Nhập tài khoản..." required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-white">Mật khẩu</label>
                                <input type="password" name="password" class="form-control border-0 bg-white bg-opacity-10 text-white py-2" placeholder="********" required>
                            </div>
                            
                            <div class="d-flex justify-content-between mb-4 small">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="remember">
                                    <label class="form-check-label text-white-50" for="remember">Ghi nhớ</label>
                                </div>
                                <a href="#" class="text-white text-decoration-none">Quên mật khẩu?</a>
                            </div>

                            <button type="submit" class="btn btn-gradient w-100 py-2 mb-3 shadow-sm">VÀO HỆ THỐNG</button>
                        </form>

                        <div class="position-relative my-4 text-center">
                            <hr class="text-white-50">
                            <span class="position-absolute top-50 start-50 translate-middle bg-transparent px-2 text-white-50 small">HOẶC</span>
                        </div>

                        <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-light w-100 rounded-pill py-2 small fw-bold shadow-sm mb-3">
                            <img src="https://www.google.com/favicon.ico" width="16" class="me-2"> Tiếp tục với Google
                        </a>

                        <div class="text-center mt-3">
                            <span class="small text-white-50">Bạn mới đến?</span>
                            <a href="/register" class="small fw-bold text-white text-decoration-none ms-1">Đăng ký phòng</a>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <a href="/" class="text-white-50 small text-decoration-none"><i class="fas fa-arrow-left me-1"></i> Quay lại trang chủ</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
